# Mail properties
spring.mail.host=${GMAIL_HOST}
spring.mail.port=${GMAIL_PORT}
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${GMAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${GMAIL_SMTP_STRATTLS}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXP}





# # Default to local dev settings
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.properties.hibernate.default_schema=${DATABASE_SCHEMA}
spring.datasource.driver-class-name=${DATABASE_CLASS_NAME}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
spring.jpa.show-sql=${SHOW_SQL}
